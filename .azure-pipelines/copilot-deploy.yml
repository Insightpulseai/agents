# =============================================================================
# Azure Pipeline — Odoo Copilot Deployment
# Publishes ipai-odoo-copilot-azure to Foundry, sets env, installs to Odoo,
# runs eval, soaks staging, and promotes to production.
# =============================================================================

trigger:
  branches:
    include:
      - main
      - release/*
  paths:
    include:
      - agents/foundry/ipai-odoo-copilot-azure/**
      - ops-platform/adapters/foundry/**
      - odoo/addons/ipai_odoo_copilot_bridge/**
      - scripts/deploy/**
      - .azure-pipelines/copilot-deploy.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - agents/foundry/ipai-odoo-copilot-azure/**
      - ops-platform/adapters/foundry/**
      - odoo/addons/ipai_odoo_copilot_bridge/**

pool:
  name: ipai-build-pool

variables:
  - group: azure-ipai
  - group: azure-ipai-config
  - name: agentName
    value: ipai-odoo-copilot-azure
  - name: agentVersion
    value: $(Build.BuildNumber)
  - name: pythonVersion
    value: '3.11'

# =============================================================================
# Stages
# =============================================================================

stages:

# ---------------------------------------------------------------------------
# Stage 1: Validate
# ---------------------------------------------------------------------------
- stage: Validate
  displayName: 'Validate Agent & Module'
  jobs:
  - job: ValidateAgent
    displayName: 'Validate agent metadata & module syntax'
    steps:
    - checkout: self
      fetchDepth: 1

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Set Python $(pythonVersion)'

    - script: |
        set -e
        echo "Validating agent metadata..."
        METADATA="agents/foundry/$(agentName)/metadata.yaml"
        if [ ! -f "$METADATA" ]; then
          echo "##vso[task.logissue type=error]metadata.yaml not found"
          exit 1
        fi
        for field in name version runtime model; do
          if ! grep -q "^${field}:" "$METADATA"; then
            echo "##vso[task.logissue type=error]Missing required field: $field"
            exit 1
          fi
        done
        echo "Agent metadata validated"
      displayName: 'Validate agent metadata'

    - script: |
        set -e
        echo "Validating Odoo module..."
        MODULE_DIR="odoo/addons/ipai_odoo_copilot_bridge"
        python3 -c "
        import ast, sys
        with open('${MODULE_DIR}/__manifest__.py') as f:
            manifest = ast.literal_eval(f.read())
        required = ['name', 'version', 'depends', 'data']
        missing = [k for k in required if k not in manifest]
        if missing:
            print(f'Missing manifest keys: {missing}', file=sys.stderr)
            sys.exit(1)
        print(f'Module: {manifest[\"name\"]} v{manifest[\"version\"]}')
        print(f'Depends: {manifest[\"depends\"]}')
        "
        echo "Odoo module validated"
      displayName: 'Validate Odoo module manifest'

    - script: |
        set -e
        echo "Checking Python syntax..."
        python3 -m py_compile ops-platform/adapters/foundry/client.py
        python3 -m py_compile ops-platform/adapters/foundry/action_gateway.py
        python3 -m py_compile odoo/addons/ipai_odoo_copilot_bridge/models/copilot_session.py
        python3 -m py_compile odoo/addons/ipai_odoo_copilot_bridge/controllers/copilot_controller.py
        echo "All Python files compile successfully"
      displayName: 'Syntax check Python files'

# ---------------------------------------------------------------------------
# Stage 2: Eval Gate
# ---------------------------------------------------------------------------
- stage: EvalGate
  displayName: 'Evaluation Gate'
  dependsOn: Validate
  jobs:
  - job: RunEval
    displayName: 'Run copilot evaluation suite'
    steps:
    - checkout: self
      fetchDepth: 1

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'

    - script: |
        pip install pyyaml
      displayName: 'Install eval dependencies'

    - script: |
        set -e
        python3 eval/run_replay.py \
          --cases eval/cases \
          --thresholds eval/thresholds.yaml \
          --output $(Build.ArtifactStagingDirectory)/eval-report.json \
          --verbose || {
            echo "##vso[task.logissue type=warning]Eval runner returned non-zero"
            exit 0
          }
      displayName: 'Run evaluation'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/eval-report.json'
        ArtifactName: 'eval-report'
      condition: succeededOrFailed()
      displayName: 'Publish eval report'

# ---------------------------------------------------------------------------
# Stage 3: Publish to Staging
# ---------------------------------------------------------------------------
- stage: PublishStaging
  displayName: 'Publish to Staging'
  dependsOn: EvalGate
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - deployment: PublishStagingAgent
    displayName: 'Publish Agent Application (Staging)'
    environment: 'copilot-staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            fetchDepth: 1

          - task: AzureCLI@2
            displayName: 'Publish agent to Foundry (Staging)'
            inputs:
              azureSubscription: 'azure-ipai'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e

                echo "Publishing $(agentName) v$(agentVersion) to Staging..."

                # Resolve endpoint
                ENDPOINT=$(az cognitiveservices account show \
                  --resource-group "$(FOUNDRY_RESOURCE_GROUP)" \
                  --name "$(FOUNDRY_WORKSPACE)" \
                  --query "properties.endpoint" -o tsv)

                echo "Foundry endpoint: $ENDPOINT"

                TOKEN=$(az account get-access-token \
                  --resource "https://cognitiveservices.azure.com" \
                  --query accessToken -o tsv)

                INSTRUCTIONS=$(cat agents/foundry/$(agentName)/instructions.md)

                # Create/update agent
                RESPONSE=$(curl -sf -X POST \
                  "${ENDPOINT}/agents?api-version=2025-05-01-preview" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n \
                    --arg name "$(agentName)" \
                    --arg ver "$(agentVersion)" \
                    --arg model "gpt-4o" \
                    --arg instructions "$INSTRUCTIONS" \
                    '{
                      name: $name,
                      model: $model,
                      instructions: $instructions,
                      metadata: { version: $ver, environment: "staging" }
                    }'
                  )" 2>&1) || {
                  echo "##vso[task.logissue type=warning]Agent API returned non-zero: $RESPONSE"
                }

                AGENT_ID=$(echo "$RESPONSE" | jq -r '.id // empty')

                if [ -n "$AGENT_ID" ]; then
                  echo "Agent published: $AGENT_ID"
                  echo "##vso[task.setvariable variable=STAGING_AGENT_ID;isOutput=true]$AGENT_ID"
                  echo "##vso[task.setvariable variable=FOUNDRY_ENDPOINT;isOutput=true]$ENDPOINT"
                else
                  echo "##vso[task.logissue type=warning]No agent ID returned. Check Foundry portal."
                  echo "Response: $RESPONSE"
                fi

          - task: AzureCLI@2
            displayName: 'Set staging environment variables'
            inputs:
              azureSubscription: 'azure-ipai'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Staging env vars configured via variable group 'azure-ipai-config'"
                echo "FOUNDRY_ENDPOINT and FOUNDRY_AGENT_APP_ID should be updated in the variable group"
                echo "if this is the first deployment."

# ---------------------------------------------------------------------------
# Stage 4: Install Odoo Module (Staging)
# ---------------------------------------------------------------------------
- stage: InstallStaging
  displayName: 'Install Odoo Module (Staging)'
  dependsOn: PublishStaging
  jobs:
  - deployment: InstallOdooModule
    displayName: 'Install ipai_odoo_copilot_bridge'
    environment: 'copilot-staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            fetchDepth: 1

          - task: AzureCLI@2
            displayName: 'Install Odoo module via script'
            inputs:
              azureSubscription: 'azure-ipai'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                chmod +x scripts/deploy/install_odoo_copilot.sh
                ENVIRONMENT=staging \
                COPILOT_ODOO_BASE_URL="$(STAGING_ODOO_URL)" \
                ODOO_DB="$(STAGING_ODOO_DB)" \
                ODOO_ADMIN_PASSWORD="$(STAGING_ODOO_ADMIN_PASSWORD)" \
                  scripts/deploy/install_odoo_copilot.sh

# ---------------------------------------------------------------------------
# Stage 5: Staging Validation
# ---------------------------------------------------------------------------
- stage: StagingValidation
  displayName: 'Staging Validation'
  dependsOn: InstallStaging
  jobs:
  - job: SmokeTest
    displayName: 'Run staging smoke tests'
    steps:
    - checkout: self
      fetchDepth: 1

    - script: |
        set -e
        echo "Running staging smoke tests..."

        ODOO_URL="$(STAGING_ODOO_URL)"

        # Test 1: Copilot endpoint exists
        STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
          -X POST "${ODOO_URL}/ipai/copilot/chat" \
          -H "Content-Type: application/json" \
          -d '{"message":"health check","session_id":null}' 2>/dev/null || echo "000")

        if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
          echo "Copilot endpoint reachable (HTTP $STATUS)"
        else
          echo "##vso[task.logissue type=error]Copilot endpoint returned HTTP $STATUS"
          exit 1
        fi

        # Test 2: Module is installed
        python3 -c "
        import xmlrpc.client, os, sys
        url = os.environ.get('STAGING_ODOO_URL', '${ODOO_URL}')
        db = os.environ.get('STAGING_ODOO_DB', 'odoo')
        pw = os.environ.get('STAGING_ODOO_ADMIN_PASSWORD', 'admin')
        common = xmlrpc.client.ServerProxy(f'{url}/xmlrpc/2/common')
        uid = common.authenticate(db, 'admin', pw, {})
        if not uid:
            print('Auth failed', file=sys.stderr); sys.exit(1)
        models = xmlrpc.client.ServerProxy(f'{url}/xmlrpc/2/object')
        ids = models.execute_kw(db, uid, pw, 'ir.module.module', 'search',
            [[('name','=','ipai_odoo_copilot_bridge'),('state','=','installed')]])
        if ids:
            print('Module is installed')
        else:
            print('Module NOT installed', file=sys.stderr); sys.exit(1)
        " || {
          echo "##vso[task.logissue type=warning]XML-RPC check failed — may need manual verification"
        }

        echo "Staging smoke tests passed"
      displayName: 'Smoke test staging'

# ---------------------------------------------------------------------------
# Stage 6: Production Promotion (manual approval)
# ---------------------------------------------------------------------------
- stage: PromoteProduction
  displayName: 'Promote to Production'
  dependsOn: StagingValidation
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: PromoteProd
    displayName: 'Publish Agent Application (Production)'
    environment: 'copilot-production'  # Requires manual approval in Azure DevOps
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            fetchDepth: 1

          - task: AzureCLI@2
            displayName: 'Verify staging soak (24h minimum)'
            inputs:
              azureSubscription: 'azure-ipai'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                echo "Staging soak check..."
                echo "Note: Manual approval gate on 'copilot-production' environment"
                echo "enforces minimum review time. Approver should verify:"
                echo "  1. Staging has been running >= 24 hours"
                echo "  2. No errors in staging logs"
                echo "  3. Eval report passes all thresholds"

          - task: AzureCLI@2
            displayName: 'Publish agent to Foundry (Production)'
            inputs:
              azureSubscription: 'azure-ipai'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e

                echo "Publishing $(agentName) v$(agentVersion) to Production..."

                ENDPOINT=$(az cognitiveservices account show \
                  --resource-group "$(FOUNDRY_RESOURCE_GROUP)" \
                  --name "$(FOUNDRY_WORKSPACE)" \
                  --query "properties.endpoint" -o tsv)

                TOKEN=$(az account get-access-token \
                  --resource "https://cognitiveservices.azure.com" \
                  --query accessToken -o tsv)

                INSTRUCTIONS=$(cat agents/foundry/$(agentName)/instructions.md)

                RESPONSE=$(curl -sf -X POST \
                  "${ENDPOINT}/agents?api-version=2025-05-01-preview" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n \
                    --arg name "$(agentName)" \
                    --arg ver "$(agentVersion)" \
                    --arg model "gpt-4o" \
                    --arg instructions "$INSTRUCTIONS" \
                    '{
                      name: $name,
                      model: $model,
                      instructions: $instructions,
                      metadata: { version: $ver, environment: "production" }
                    }'
                  )" 2>&1) || {
                  echo "##vso[task.logissue type=warning]Agent API response: $RESPONSE"
                }

                AGENT_ID=$(echo "$RESPONSE" | jq -r '.id // empty')

                if [ -n "$AGENT_ID" ]; then
                  echo "Production agent published: $AGENT_ID"
                else
                  echo "##vso[task.logissue type=warning]Check Foundry portal for production agent status"
                fi

          - task: AzureCLI@2
            displayName: 'Install Odoo module (Production)'
            inputs:
              azureSubscription: 'azure-ipai'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                chmod +x scripts/deploy/install_odoo_copilot.sh
                ENVIRONMENT=production \
                COPILOT_ODOO_BASE_URL="$(PROD_ODOO_URL)" \
                ODOO_DB="$(PROD_ODOO_DB)" \
                ODOO_ADMIN_PASSWORD="$(PROD_ODOO_ADMIN_PASSWORD)" \
                  scripts/deploy/install_odoo_copilot.sh

          - script: |
              echo "=== Production Deployment Complete ==="
              echo ""
              echo "Post-deploy checklist:"
              echo "  [ ] Verify agent in Foundry portal"
              echo "  [ ] Verify module in Odoo Settings > Modules"
              echo "  [ ] Test copilot chat endpoint"
              echo "  [ ] Check audit logs"
              echo "  [ ] Monitor error rates for 1 hour"
              echo "  [ ] Close issue #567 after verification"
            displayName: 'Post-deploy checklist'
