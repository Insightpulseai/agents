name: Agent SSOT Check

on:
  push:
    paths:
      - 'infra/ssot/agents/**'
      - 'infra/ssot/platform/**'
      - 'eval/**'
      - 'spec/odoo-copilot-agent-framework/**'
      - 'contracts/**'
      - 'tests/test_agent_*.py'
      - 'tests/test_spec_*.py'
      - 'scripts/ci/validate_agent_ssot.py'
  pull_request:
    paths:
      - 'infra/ssot/agents/**'
      - 'infra/ssot/platform/**'
      - 'eval/**'
      - 'spec/odoo-copilot-agent-framework/**'
      - 'contracts/**'
      - 'tests/test_agent_*.py'
      - 'tests/test_spec_*.py'
      - 'scripts/ci/validate_agent_ssot.py'

jobs:
  validate:
    name: Validate Agent SSOT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run SSOT validator
        run: python scripts/ci/validate_agent_ssot.py

      - name: Run tests
        run: pytest tests/test_agent_ingress_matrix.py tests/test_agent_capability_matrix.py tests/test_spec_ssot_consistency.py -v
