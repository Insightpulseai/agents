name: ssot-platform-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-ssot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest

      - name: Run validators
        run: |
          python ops-platform/scripts/validate_ssot.py
          python ops-platform/scripts/validate_repo_boundaries.py

      - name: Run tests
        run: |
          pytest ops-platform/tests -q
