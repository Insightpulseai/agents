# PRIORITY MATRIX — Team Certification Roadmap
# =============================================================================

priority_roadmap:
  immediate:
    description: "Required for go-live"
    certs:
      - AI-102   # AI Engineer — all AI services
      - AZ-204   # Developer — Foundry integration
      - SC-300   # Identity — Entra ID auth
      - AB-900   # Copilot Admin — agent management
      - GH-200   # GitHub Actions — CI/CD

  next_quarter:
    description: "Production hardening"
    certs:
      - AZ-305   # Architecture — scaling decisions
      - AZ-400   # DevOps — GenAIOps
      - AB-100   # Agentic AI Architect
      - AZ-500   # Security Engineer
      - AI-900   # AI Fundamentals (team-wide)

  future:
    description: "Advanced optimization"
    certs:
      - AI-300   # Data Scientist — fine-tuning
      - DP-600   # Fabric — data platform
      - SC-100   # Security Architect
      - GH-300   # GitHub Copilot
