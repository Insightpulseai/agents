cloud_ai_platforms:

  # --- Fundamentals ---
  fundamentals:
    - id: AZ-900
      name: "Azure Fundamentals"
      tier: Fundamentals
      role: "All team members"
      relevance: core
      maps_to:
        - azure_ai.foundry.intro_ai_azure
