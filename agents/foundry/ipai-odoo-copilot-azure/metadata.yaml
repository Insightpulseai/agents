name: ipai-odoo-copilot-azure
version: "1.0.0"
description: >
  InsightPulseAI Odoo Copilot — Azure AI Foundry agent for compliance,
  finance operations, and ERP assistance within the Odoo platform.

runtime: azure-ai-foundry
model: gpt-4o

default_mode: PROD-ADVISORY

modes:
  PROD-ADVISORY:
    description: Read-only advisory responses. No write actions permitted.
    allow_writes: false
  PROD-CONFIRMED:
    description: Write actions allowed only after explicit user confirmation.
    allow_writes: true
    require_confirmation: true

tools:
  - compliance_calendar
  - finding_lookup
  - task_draft
  - report_helper
  - record_navigator

knowledge:
  - bir_tax_compliance.md
  - vat_ewt_slsp_2307_guide.md
  - company_policies.md

# Azure AI target capabilities this agent uses or plans to use
# Full inventory: agents/capabilities/azure_ai_target.yaml
target_capabilities:
  active:
    - azure_ai.foundry.agent_publish         # Foundry Agent Application (core)
    - azure_ai.foundry.genaiops              # CI/CD, eval gates, staging soak
    - azure_ai.search.knowledge_mining       # RAG for compliance knowledge base
  planned:
    - azure_ai.document.intelligence         # BIR form extraction, invoice OCR
    - azure_ai.language.text_analysis        # NLP for document parsing
    - azure_ai.language.foundry_tools        # In-Foundry text analytics
    - azure_ai.vision.computer_vision        # Receipt/invoice image processing
    - azure_ai.vision.multimodal             # Audit evidence visual verification
    - azure_ai.search.information_extraction # Regulatory document extraction
    - azure_ai.foundry.agent_optimization    # Production latency/quality tuning
    - azure_ai.foundry.genai_performance     # Cost and throughput optimization
  future:
    - azure_ai.speech.agent                  # Voice-driven copilot
    - azure_ai.foundry.fine_tuning           # Domain-specific model
    - azure_ai.media.video_generation        # Training videos
    - azure_ai.business.teams_integration    # Teams channel distribution

# Certification alignment for team skills
certification_alignment:
  required: [AI-102, AZ-204, SC-300, AB-900]
  recommended: [AZ-305, AZ-400, AB-100, AZ-500]

publish:
  staging:
    auto_publish: false
    requires_eval_pass: true
  production:
    auto_publish: false
    requires_eval_pass: true
    requires_staging_soak: true
    min_staging_soak_hours: 24
