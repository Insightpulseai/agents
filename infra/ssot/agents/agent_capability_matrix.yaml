version: 1.0.0
system: odoo_copilot_foundry

components:
  - name: ipai-odoo-copilot-advisory
    form: foundry_prompt_agent
    purpose: user_facing_grounded_qa
    capability_classes:
      - informational
    capability_packs:
      - databricks_intelligence
      - fal_creative_production
      - marketing_strategy_and_insight
      - bir_compliance
      - document_intake_and_extraction
    tools:
      - azure_ai_search
      - foundry_knowledge
      - bir_compliance_search
      - search_knowledge_bir
    allowed_actions:
      - explain
      - summarize
      - recommend
      - compare
      - handoff
    blocked_actions:
      - writes
      - admin_security_changes
      - finance_execution
      - direct_publish_export
    evals:
      system:
        - task_completion
        - task_adherence
        - intent_resolution
        - relevance
        - groundedness_optional

  - name: ipai-odoo-copilot-ops
    form: agent_framework_agent
    purpose: internal_read_only_diagnostics
    capability_classes:
      - navigational
      - diagnostic
    capability_packs:
      - databricks_intelligence
      - marketing_strategy_and_insight
      - bir_compliance
      - document_intake_and_extraction
    tools:
      - odoo_read_only_ops
      - databricks_monitoring_read
      - infra_runtime_read
      - check_overdue_filings
      - inspect_bir_return_state
      - inspect_bir_configuration
      - inspect_bir_kb_index_status
    allowed_actions:
      - inspect
      - diagnose
      - compare_state
      - summarize_incidents
      - recommend_remediation
    blocked_actions:
      - record_mutation
      - secret_changes
      - role_changes
      - uncontrolled_job_execution
    evals:
      system:
        - task_completion
        - task_adherence
      process:
        - tool_selection
        - tool_call_success
        - tool_output_utilization

  - name: ipai-odoo-copilot-actions
    form: agent_framework_agent
    purpose: controlled_execution_and_bounded_writes
    capability_classes:
      - transactional
    capability_packs:
      - databricks_intelligence
      - fal_creative_production
      - bir_compliance
      - document_intake_and_extraction
    tools:
      - odoo_approved_write_tools
      - databricks_approved_job_actions
      - fal_approved_generation_actions
      - evidence_writer
      - compute_bir_vat_return
      - compute_bir_withholding_return
      - validate_bir_return
      - generate_alphalist
      - generate_efps_xml
      - generate_bir_pdf
    allowed_actions:
      - create_update_allowed_records
      - trigger_approved_jobs
      - launch_approved_creative_runs
      - prepare_exports
      - write_evidence
    blocked_actions:
      - unrestricted_writes
      - destructive_ops
      - policy_bypass
      - silent_batch_execution
    evals:
      process:
        - tool_selection
        - tool_input_accuracy
        - tool_call_success
      safety:
        - approval_compliance
        - unauthorized_action_refusal

  - name: ipai-odoo-copilot-router
    form: agent_framework_workflow
    purpose: deterministic_routing_approvals_handoffs
    capability_classes:
      - orchestration
    capability_packs:
      - databricks_intelligence
      - fal_creative_production
      - bir_compliance
    tools:
      - workflow_graph
      - approval_steps
      - evidence_correlation
    allowed_actions:
      - route
      - pause_for_approval
      - resume
      - handoff
      - checkpoint
      - collect_trace_context
    blocked_actions:
      - free_form_reasoning
      - broad_vendor_logic
      - direct_domain_mutation
    evals:
      process:
        - routing_correctness
        - handoff_success
        - approval_compliance
      system:
        - end_to_end_task_completion

capability_packs:
  databricks_intelligence:
    description: Lakeflow/ETL, Databricks Apps, job health, industry solutions, refresh/run triggers
    advisory: true
    ops: true
    actions: true
    router: true
  fal_creative_production:
    description: Brief-to-prompt, generation queue health, model/cost/speed guidance, approved batch generation, export/package
    advisory: true
    ops: true
    actions: true
    router: true
  marketing_strategy_and_insight:
    description: Campaign strategy (Smartly), consumer insight (Quilt.AI), creative benchmarking (LIONS), performance/MMM/GEO (Data Intelligence)
    advisory: true
    ops: true
    actions: light
    router: false
  bir_compliance:
    description: BIR regulation grounding, form guidance, return computation, validation, alphalist, filing artifacts, notification workflow
    advisory: true
    ops: true
    actions: true
    router: true
  document_intake_and_extraction:
    description: OCR/read, layout/table extraction, invoice/receipt ingestion, BIR attachment classification, evidence normalization
    advisory: true
    ops: true
    actions: true
    router: false
