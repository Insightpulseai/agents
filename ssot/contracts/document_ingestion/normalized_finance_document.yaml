name: normalized_finance_document
version: v1
description: >
  Canonical schema for finance documents ingested from Telegram via Azure Document Intelligence.
  Used as the bridge between OCR extraction, Foundry orchestration, and Odoo record creation.
fields:
  - name: document_id
    type: string
    required: true
    description: Unique identifier for this document instance
  - name: correlation_id
    type: string
    required: true
    description: Immutable correlation key linking all stages of processing
  - name: source_channel
    type: string
    required: true
    enum: [telegram]
  - name: telegram_chat_id
    type: string
    required: true
  - name: telegram_message_id
    type: string
    required: true
  - name: telegram_file_id
    type: string
    required: true
  - name: sender_identity
    type: string
    required: true
    description: Telegram user id or mapped employee/contact identity
  - name: document_type
    type: string
    required: true
    enum: [receipt, invoice, official_receipt, unsupported]
  - name: document_type_confidence
    type: number
    required: true
    description: Classification confidence score (0.0 - 1.0)
  - name: legal_entity
    type: string
    required: false
  - name: employee_contact
    type: string
    required: false
  - name: vendor_name
    type: string
    required: false
  - name: vendor_tax_id
    type: string
    required: false
  - name: invoice_number
    type: string
    required: false
  - name: receipt_number
    type: string
    required: false
  - name: transaction_date
    type: string
    format: date
    required: false
  - name: due_date
    type: string
    format: date
    required: false
  - name: currency
    type: string
    required: false
  - name: subtotal
    type: number
    required: false
  - name: tax_amount
    type: number
    required: false
  - name: total_amount
    type: number
    required: false
  - name: line_items
    type: array
    required: false
    items:
      type: object
      properties:
        description: string
        quantity: number
        unit_price: number
        amount: number
        tax_rate: number
  - name: project_code
    type: string
    required: false
  - name: cost_center
    type: string
    required: false
  - name: department
    type: string
    required: false
  - name: payment_method
    type: string
    required: false
  - name: reimbursable
    type: boolean
    required: false
  - name: confidence_score
    type: number
    required: true
    description: Overall extraction confidence (0.0 - 1.0)
  - name: completeness_score
    type: number
    required: true
    description: Required-field completeness ratio (0.0 - 1.0)
  - name: duplicate_suspected
    type: boolean
    required: true
  - name: exception_flags
    type: array
    required: true
    items:
      type: string
  - name: extraction_model
    type: string
    required: true
    description: Document Intelligence model identifier used for extraction
  - name: raw_ocr_payload_ref
    type: string
    required: true
    description: Reference to stored raw OCR/extraction output
  - name: source_file_ref
    type: string
    required: true
    description: Reference to stored source file in blob storage
  - name: foundry_trace_id
    type: string
    required: false
    description: Foundry agent trace/run identifier
  - name: review_status
    type: string
    required: true
    enum: [pending, in_review, approved, rejected, draft_created]
  - name: odoo_target_model
    type: string
    required: false
    enum: [hr.expense, account.move]
  - name: odoo_target_id
    type: integer
    required: false
